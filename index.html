<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#ED2024" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" type="image/png" href="/assets/icon-192.png?v=supreme-v3" />
    <link rel="shortcut icon" href="/assets/icon-192.png?v=supreme-v3" type="image/png" />
    <link rel="apple-touch-icon" href="/assets/apple-touch-icon.png?v=supreme-v3" />
    <link rel="icon" type="image/svg+xml" href="/assets/icon-192.png?v=supreme-v3" />
    <title>Sorveteria Supreme - Pedidos & Delivery</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then((reg) => console.log('Service Worker registrado com sucesso:', reg.scope))
            .catch((err) => console.error('Erro ao registrar Service Worker:', err));
        });
      }
    </script>
  </body>
</html>
